<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Objetivos do Ano</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <h1 class="titulo">Meus objetivos do ano<span class="cursor">_</span></h1>
        
        <section class="conteudo-principal">
            <div class="abas">
                <button class="aba-botao">Cursos na Alura</button>
                <button class="aba-botao">Criar projetos em Javascript</button>
                <button class="aba-botao">Criar um portfólio</button>
                <button class="aba-botao ativo">Atualizar meu currículo</button>
            </div>

            <div class="abas-conteudo">
                <div class="conteudo ativo">
                    <p class="descricao">Atualizar meu currículo com os certificados da Alura</p>
                    <p class="label-tempo">TEMPO PARA COMPLETAR O OBJETIVO</p>
                    
                    <div class="contador">
                        <div class="contador-digito">
                            <span class="numero">0</span>
                            <span class="legenda">dias</span>
                        </div>
                        <div class="contador-digito">
                            <span class="numero">0</span>
                            <span class="legenda">horas</span>
                        </div>
                        <div class="contador-digito">
                            <span class="numero">0</span>
                            <span class="legenda">min</span>
                        </div>
                        <div class="contador-digito">
                            <span class="numero">0</span>
                            <span class="legenda">seg</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <script src="main.js"></script>
</body>
</html>
